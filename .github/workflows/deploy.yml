name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/stock-market-tracker-backend:latest
            ghcr.io/${{ env.OWNER }}/stock-market-tracker-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/stock-market-tracker-frontend:latest
            ghcr.io/${{ env.OWNER }}/stock-market-tracker-frontend:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t ed25519 ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to VPS
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            GHCR_TOKEN="$GHCR_TOKEN" \
            OWNER="$OWNER" \
            bash -s << 'ENDSSH'
          set -ex
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$OWNER" --password-stdin

          docker pull ghcr.io/$OWNER/stock-market-tracker-backend:latest
          docker pull ghcr.io/$OWNER/stock-market-tracker-frontend:latest

          docker stop stock-tracker-backend 2>/dev/null || true
          docker rm   stock-tracker-backend 2>/dev/null || true
          docker run -d \
            --name stock-tracker-backend \
            --restart unless-stopped \
            --network stock-market-tracker_stock-net \
            -p 4003:8000 \
            --env-file /home/noki/stock-market-tracker/backend/.env \
            ghcr.io/$OWNER/stock-market-tracker-backend:latest

          docker stop stock-tracker-frontend 2>/dev/null || true
          docker rm   stock-tracker-frontend 2>/dev/null || true
          docker run -d \
            --name stock-tracker-frontend \
            --restart unless-stopped \
            --network stock-market-tracker_stock-net \
            -p 4002:3000 \
            ghcr.io/$OWNER/stock-market-tracker-frontend:latest

          docker image prune -f
          sleep 4
          curl -sf http://localhost:4003/health && echo " backend live"
          curl -sf -o /dev/null http://localhost:4002 && echo " frontend live"
          ENDSSH
