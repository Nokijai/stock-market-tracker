version: "3.9"

# Production compose — used by CI/CD on the VPS.
# Images are pulled from GHCR; set env vars before running:
#   export BACKEND_IMAGE=ghcr.io/nokijai/stock-market-tracker/backend:latest
#   export FRONTEND_IMAGE=ghcr.io/nokijai/stock-market-tracker/frontend:latest
#   docker-compose -f docker-compose.prod.yml up -d

services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/nokijai/stock-market-tracker/backend:latest}
    ports:
      - "4003:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - stock-net
    volumes:
      - stock-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/nokijai/stock-market-tracker/frontend:latest}
    ports:
      - "4002:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - stock-net

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    restart: unless-stopped
    networks:
      - stock-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  stock-data:

networks:
  stock-net:
    driver: bridge