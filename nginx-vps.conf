# ─────────────────────────────────────────────────────────────────────────────
# nginx VPS configuration — stock.worldofnoki.com
#
# Installation:
#   sudo cp nginx-vps.conf /etc/nginx/sites-available/stock.worldofnoki.com
#   sudo ln -s /etc/nginx/sites-available/stock.worldofnoki.com \
#              /etc/nginx/sites-enabled/stock.worldofnoki.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (run after the above):
#   sudo certbot --nginx -d stock.worldofnoki.com
# ─────────────────────────────────────────────────────────────────────────────

# Shared proxy settings — included in both location blocks
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name stock.worldofnoki.com;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/stock-access.log;
    error_log  /var/log/nginx/stock-error.log;

    # ── API proxy → Docker backend (port 4003) ───────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:4003/;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        # Standard forwarding headers
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Frontend proxy → Docker frontend (port 4002) ─────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:4002;
        proxy_http_version 1.1;

        # WebSocket upgrade headers (needed for Vite HMR / WS connections)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        # Standard forwarding headers
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;
}
